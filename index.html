<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Towards Dev</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <button id="installBtn" style="display:none;">
  Install App
</button>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273348;
      --accent: #6366f1;
      --accent2: #22d3ee;
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
    }
#installBtn {
  background: #6366f1;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
      position: sticky; top: 0; z-index: 10;
    }

    .app-title {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: default;
      user-select: none;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .date-badge {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .streak-badge {
      font-size: 0.75rem;
      background: linear-gradient(135deg, #f59e0b33, #f59e0b22);
      border: 1px solid #f59e0b66;
      color: #fbbf24;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── PROGRESS RING ── */
    .progress-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 10px;
      gap: 8px;
    }

    .ring-wrap { position: relative; width: 130px; height: 130px; }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }

    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .ring-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .ring-percent { font-size: 1.8rem; font-weight: 800; color: var(--text); }
    .ring-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    .progress-caption { font-size: 0.85rem; color: var(--muted); }

    /* ── SECTIONS ── */
    .section {
      margin: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #334155;
    }

    .section-header {
      padding: 12px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ── TASK ITEM ── */
    .task-item {
      display: flex;
      align-items: flex-start;
      padding: 14px 16px;
      gap: 14px;
      border-bottom: 1px solid #1e293b;
      transition: background 0.2s;
      cursor: pointer;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #273348; }

    .task-item.done { opacity: 0.55; }

    .checkbox {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--muted);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
    }

    .task-item.done .checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .checkmark {
      display: none;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .task-item.done .checkmark { display: block; }

    .task-body { flex: 1; }

    .task-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .task-item.done .task-name { text-decoration: line-through; }

    .task-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .tag.aiml { background: #6366f122; color: #a5b4fc; border: 1px solid #6366f144; }
    .tag.gate { background: #22d3ee22; color: #67e8f9; border: 1px solid #22d3ee44; }
    .tag.leet { background: #f59e0b22; color: #fcd34d; border: 1px solid #f59e0b44; }
    .tag.weekend { background: #10b98122; color: #6ee7b7; border: 1px solid #10b98144; }
    .tag.bonus { background: #ec489922; color: #f9a8d4; border: 1px solid #ec489944; }

    .time-indicator {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .completed-time {
      font-size: 0.7rem;
      color: var(--success);
      margin-top: 3px;
    }

    /* ── MOTIVATIONAL BANNER ── */
    .banner {
      margin: 0 16px 16px;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .banner.great { background: #10b98120; border: 1px solid #10b98144; color: #6ee7b7; }
    .banner.good  { background: #6366f120; border: 1px solid #6366f144; color: #a5b4fc; }
    .banner.start { background: #f59e0b20; border: 1px solid #f59e0b44; color: #fcd34d; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 16px 16px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      border: 1px solid #334155;
    }

    .stat-num { font-size: 1.5rem; font-weight: 800; }
    .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    .stat-card.streak .stat-num { color: #fbbf24; }
    .stat-card.done-count .stat-num { color: var(--success); }
    .stat-card.pending .stat-num { color: var(--warn); }

    /* ── ADMIN MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      border: 1px solid #475569;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .modal p  { font-size: 0.82rem; color: var(--muted); margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group textarea { resize: vertical; min-height: 60px; }

    .btn-row { display: flex; gap: 10px; margin-top: 18px; }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #475569; }
    .btn-danger { background: var(--danger); color: white; }

    /* ── ADMIN PANEL (inside modal) ── */
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .admin-task-list { max-height: 220px; overflow-y: auto; }

    .admin-task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--surface2);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.82rem;
      gap: 10px;
    }

    .admin-task-row .atask-name { flex: 1; }

    .del-btn {
      background: #ef444422;
      color: #ef4444;
      border: 1px solid #ef444444;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* ── WEEK HEATMAP ── */
    .heatmap-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin: 4px 0 16px;
    }

    .hm-cell {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      background: var(--surface2);
      color: var(--muted);
      gap: 2px;
    }

    .hm-cell .hm-day { font-size: 0.55rem; text-transform: uppercase; }

    .hm-cell.perfect  { background: #10b98133; color: #6ee7b7; border: 1px solid #10b98166; }
    .hm-cell.good-day { background: #6366f133; color: #a5b4fc; border: 1px solid #6366f166; }
    .hm-cell.bad-day  { background: #ef444433; color: #fca5a5; border: 1px solid #ef444466; }
    .hm-cell.today    { border: 2px solid var(--accent2); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid #475569;
      color: var(--text);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── RESET BUTTON ── */
    .reset-btn {
      display: block;
      margin: 4px auto 20px;
      background: transparent;
      border: 1px solid #334155;
      color: var(--muted);
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

    @media (max-width: 360px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .hm-cell { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="app-title" id="appTitle">⚡ Towards Dev</div>
  <div class="header-right">
    <div class="date-badge" id="dateBadge"></div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>
</header>

<!-- PROGRESS RING -->
<div class="progress-section">
  <div class="ring-wrap">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#6366f1"/>
          <stop offset="100%" style="stop-color:#22d3ee"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="65" cy="65" r="55"/>
      <circle class="ring-fill" id="ringFill" cx="65" cy="65" r="55"
        stroke-dasharray="345.4"
        stroke-dashoffset="345.4"/>
    </svg>
    <div class="ring-text">
      <div class="ring-percent" id="ringPercent">0%</div>
      <div class="ring-label">TODAY</div>
    </div>
  </div>
  <div class="progress-caption" id="progressCaption">Start your day strong 💪</div>
</div>

<!-- WEEK HEATMAP -->
<div class="heatmap-row" id="heatmapRow"></div>

<!-- MOTIVATIONAL BANNER -->
<div class="banner start" id="motiveBanner">
  <span>🚀</span>
  <span id="motiveText">Let's get to work, Syed!</span>
</div>

<!-- STATS ROW -->
<div class="stats-row">
  <div class="stat-card streak">
    <div class="stat-num" id="statStreak">0</div>
    <div class="stat-label">🔥 Streak</div>
  </div>
  <div class="stat-card done-count">
    <div class="stat-num" id="statDone">0</div>
    <div class="stat-label">✅ Done</div>
  </div>
  <div class="stat-card pending">
    <div class="stat-num" id="statPending">0</div>
    <div class="stat-label">⏳ Pending</div>
  </div>
</div>

<!-- TASK SECTIONS -->
<div id="taskSections"></div>

<!-- RESET -->
<button class="reset-btn" id="resetBtn">↺ Reset Today's Progress</button>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>🔐 Admin Access</h2>
    <p>Double-click the app title to enter admin mode.</p>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter admin password" />
    </div>
    <div id="loginError" style="color:#ef4444;font-size:0.78rem;margin-bottom:10px;display:none">
      ❌ Wrong password
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('loginModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <h2>⚙️ Admin Panel</h2>
    <p>Manage tasks and settings</p>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('addTask')">+ Add Task</button>
      <button class="tab-btn" onclick="switchTab('manageTasks')">Manage</button>
      <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
    </div>

    <!-- ADD TASK TAB -->
    <div class="tab-panel active" id="tab-addTask">
      <div class="form-group">
        <label>Task Name</label>
        <input type="text" id="newTaskName" placeholder="e.g. Read ML paper" />
      </div>
      <div class="form-group">
        <label>Category Tag</label>
        <select id="newTaskTag">
          <option value="leet">🟡 LeetCode</option>
          <option value="gate">🔵 GATE</option>
          <option value="aiml">🟣 AIML</option>
          <option value="weekend">🟢 Weekend</option>
          <option value="bonus">🌸 Bonus</option>
        </select>
      </div>
      <div class="form-group">
        <label>Duration / Note (optional)</label>
        <input type="text" id="newTaskNote" placeholder="e.g. 1 hr" />
      </div>
      <div class="form-group">
        <label>Applies to</label>
        <select id="newTaskDays">
          <option value="weekday">Weekdays only (Mon–Fri)</option>
          <option value="weekend">Weekends only (Sat–Sun)</option>
          <option value="daily">Every day</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal('adminModal')">Close</button>
        <button class="btn btn-primary" onclick="addCustomTask()">Add Task</button>
      </div>
    </div>

    <!-- MANAGE TASKS TAB -->
    <div class="tab-panel" id="tab-manageTasks">
      <div class="form-group">
        <label>Filter</label>
        <select id="manageFilter" onchange="renderAdminTaskList()">
          <option value="all">All tasks</option>
          <option value="weekday">Weekday</option>
          <option value="weekend">Weekend</option>
          <option value="daily">Daily</option>
        </select>
      </div>
      <div class="admin-task-list" id="adminTaskList"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-secondary" onclick="closeModal('adminModal')">Close</button>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <div class="form-group">
        <label>Change Admin Password</label>
        <input type="password" id="newPassInput" placeholder="New password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassInput" placeholder="Confirm new password" />
      </div>
      <div id="passMsg" style="font-size:0.78rem;margin-bottom:8px"></div>
      <button class="btn btn-primary" style="width:100%" onclick="changePassword()">Update Password</button>
      <hr style="border-color:#334155;margin:16px 0"/>
      <button class="btn btn-danger" style="width:100%;margin-top:4px" onclick="nukeData()">🗑 Clear ALL Data</button>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-secondary" onclick="closeModal('adminModal')">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS & DEFAULTS
// ─────────────────────────────────────────────
const DEFAULT_PASS = 'syed@admin';

const DEFAULT_WEEKDAY_TASKS = [
  { id: 'lc1',   name: 'Solve 1 LeetCode Problem',        tag: 'leet',    note: '~45 min', days: 'weekday' },
  { id: 'gate1', name: 'GATE Study Session',               tag: 'gate',    note: '2 hrs',   days: 'weekday' },
  { id: 'gate2', name: 'GATE Problem Solving Practice',    tag: 'gate',    note: '2 hrs',   days: 'weekday' },
  { id: 'aiml1', name: 'AIML Skill Development',           tag: 'aiml',    note: '1 hr',    days: 'weekday' },
  { id: 'b1',    name: 'Quick Concept Flashcard Review',   tag: 'bonus',   note: '15 min',  days: 'weekday' },
  { id: 'b2',    name: 'Log Today\'s Learning (journal)',  tag: 'bonus',   note: '5 min',   days: 'weekday' },
];

const DEFAULT_WEEKEND_TASKS = [
  { id: 'wk1',   name: 'GATE Weekly Revision',             tag: 'weekend', note: '2–3 hrs', days: 'weekend' },
  { id: 'wk2',   name: 'LeetCode Weekly Revision',         tag: 'leet',    note: '1 hr',    days: 'weekend' },
  { id: 'wk3',   name: 'Build a Mini AIML Project',        tag: 'aiml',    note: '2–3 hrs', days: 'weekend' },
  { id: 'b3',    name: 'Plan Next Week\'s Topics',         tag: 'bonus',   note: '15 min',  days: 'weekend' },
];

const DAILY_TASKS = [
  { id: 'd1', name: 'Drink 8 glasses of water 💧',        tag: 'bonus', note: 'health', days: 'daily' },
];

const TAG_LABELS = {
  leet: '🟡 LeetCode', gate: '🔵 GATE', aiml: '🟣 AIML',
  weekend: '🟢 Weekend', bonus: '🌸 Bonus'
};

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ─────────────────────────────────────────────
//  STORAGE HELPERS
// ─────────────────────────────────────────────
const get = k => JSON.parse(localStorage.getItem(k) || 'null');
const set = (k, v) => localStorage.setItem(k, JSON.stringify(v));

function initStorage() {
  if (!get('tasks')) set('tasks', [...DEFAULT_WEEKDAY_TASKS, ...DEFAULT_WEEKEND_TASKS, ...DAILY_TASKS]);
  if (!get('password')) set('password', DEFAULT_PASS);
  if (!get('history')) set('history', {});
  if (!get('streak')) set('streak', { count: 0, lastDate: null });
}

// ─────────────────────────────────────────────
//  DATE HELPERS
// ─────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isWeekend(date = new Date()) { const d = date.getDay(); return d === 0 || d === 6; }
function isWeekday(date = new Date()) { return !isWeekend(date); }

function getApplicableTasks() {
  const all = get('tasks') || [];
  return all.filter(t => {
    if (t.days === 'daily') return true;
    if (t.days === 'weekend') return isWeekend();
    if (t.days === 'weekday') return isWeekday();
    return true;
  });
}

// ─────────────────────────────────────────────
//  PROGRESS & HISTORY
// ─────────────────────────────────────────────
function getTodayState() {
  const h = get('history') || {};
  return h[todayKey()] || {};
}

function saveTodayState(state) {
  const h = get('history') || {};
  h[todayKey()] = state;
  set('history', h);
}

function toggleTask(id) {
  const state = getTodayState();
  if (state[id] && state[id].done) {
    state[id] = { done: false };
  } else {
    state[id] = { done: true, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
  }
  saveTodayState(state);
  updateStreak();
  render();
  showToast(state[id].done ? '✅ Task marked complete!' : '↩ Task unmarked');
}

function updateStreak() {
  const tasks = getApplicableTasks();
  const state = getTodayState();
  const allDone = tasks.every(t => state[t.id]?.done);
  const streak = get('streak') || { count: 0, lastDate: null };
  const today = todayKey();

  if (allDone && streak.lastDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    streak.count = streak.lastDate === yKey ? streak.count + 1 : 1;
    streak.lastDate = today;
    set('streak', streak);
  }
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  renderHeader();
  renderRing();
  renderBanner();
  renderStats();
  renderHeatmap();
  renderTasks();
}

function renderHeader() {
  const d = new Date();
  document.getElementById('dateBadge').textContent =
    d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
  const streak = get('streak') || { count: 0 };
  document.getElementById('streakBadge').textContent = `🔥 ${streak.count}`;
}

function renderRing() {
  const tasks = getApplicableTasks();
  const state = getTodayState();
  const done = tasks.filter(t => state[t.id]?.done).length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
  const circ = 345.4;
  const offset = circ - (pct / 100) * circ;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringPercent').textContent = pct + '%';

  const captions = [
    [0,  0,  'Start your day strong 💪'],
    [1,  25, 'Good start! Keep going 🔥'],
    [26, 50, 'Halfway there, Syed! 🚀'],
    [51, 75, 'Great momentum! Push on 💡'],
    [76, 99, 'Almost perfect! One more 🎯'],
    [100,100,'Perfect day! 🏆 You crushed it!']
  ];
  const cap = captions.find(c => pct >= c[0] && pct <= c[1]);
  document.getElementById('progressCaption').textContent = cap ? cap[2] : '';
}

function renderBanner() {
  const tasks = getApplicableTasks();
  const state = getTodayState();
  const done = tasks.filter(t => state[t.id]?.done).length;
  const pct = tasks.length ? (done / tasks.length) * 100 : 0;
  const el = document.getElementById('motiveBanner');
  const txt = document.getElementById('motiveText');
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

  if (pct === 100) {
    el.className = 'banner great';
    txt.textContent = `${greet}, Syed! 🏆 All tasks done — you're unstoppable!`;
  } else if (pct >= 50) {
    el.className = 'banner good';
    txt.textContent = `${greet}, Syed! You're ${Math.round(pct)}% through. Keep the momentum!`;
  } else {
    el.className = 'banner start';
    txt.textContent = `${greet}, Syed! GATE + AIML grind continues. Let's go! 🔥`;
  }
}

function renderStats() {
  const tasks = getApplicableTasks();
  const state = getTodayState();
  const done = tasks.filter(t => state[t.id]?.done).length;
  const streak = get('streak') || { count: 0 };
  document.getElementById('statStreak').textContent = streak.count;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = tasks.length - done;
}

function renderHeatmap() {
  const container = document.getElementById('heatmapRow');
  container.innerHTML = '';
  const history = get('history') || {};
  const today = new Date();

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayTasks = (get('tasks') || []).filter(t => {
      const wd = d.getDay() === 0 || d.getDay() === 6;
      if (t.days === 'daily') return true;
      if (t.days === 'weekend') return wd;
      if (t.days === 'weekday') return !wd;
      return true;
    });
    const dayState = history[key] || {};
    const done = dayTasks.filter(t => dayState[t.id]?.done).length;
    const pct = dayTasks.length ? done / dayTasks.length : 0;

    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    if (i === 0) cell.classList.add('today');
    if (pct === 1 && dayTasks.length > 0) cell.classList.add('perfect');
    else if (pct >= 0.5) cell.classList.add('good-day');
    else if (pct > 0 && pct < 0.5) cell.classList.add('bad-day');

    cell.innerHTML = `<div class="hm-day">${DAYS[d.getDay()]}</div><div>${done}/${dayTasks.length}</div>`;
    container.appendChild(cell);
  }
}

function renderTasks() {
  const container = document.getElementById('taskSections');
  container.innerHTML = '';
  const tasks = getApplicableTasks();
  const state = getTodayState();

  const sections = isWeekend()
    ? [
        { label: 'Weekend Revision & Build', color: '#10b981', tag: null, filter: () => true }
      ]
    : [
        { label: 'Core Daily Tasks', color: '#6366f1', filter: t => t.tag !== 'bonus' && t.days !== 'weekend' },
        { label: 'Bonus Habits', color: '#ec4899', filter: t => t.tag === 'bonus' }
      ];

  sections.forEach(sec => {
    const sectionTasks = tasks.filter(sec.filter);
    if (!sectionTasks.length) return;

    const div = document.createElement('div');
    div.className = 'section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<div class="dot" style="background:${sec.color}"></div>${sec.label}`;
    div.appendChild(header);

    sectionTasks.forEach(task => {
      const isDone = !!state[task.id]?.done;
      const completedAt = state[task.id]?.time;

      const item = document.createElement('div');
      item.className = 'task-item' + (isDone ? ' done' : '');
      item.onclick = () => toggleTask(task.id);

      item.innerHTML = `
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="task-body">
          <div class="task-name">${task.name}</div>
          <div class="task-meta">
            <span class="tag ${task.tag}">${TAG_LABELS[task.tag] || task.tag}</span>
            ${task.note ? `<span class="time-indicator">⏱ ${task.note}</span>` : ''}
          </div>
          ${completedAt ? `<div class="completed-time">✅ Completed at ${completedAt}</div>` : ''}
        </div>
      `;
      div.appendChild(item);
    });

    container.appendChild(div);
  });
}

// ─────────────────────────────────────────────
//  ADMIN
// ─────────────────────────────────────────────
let loginAttempts = 0;

document.getElementById('appTitle').addEventListener('dblclick', () => {
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
  openModal('loginModal');
});

function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (pass === (get('password') || DEFAULT_PASS)) {
    closeModal('loginModal');
    loginAttempts = 0;
    renderAdminTaskList();
    openModal('adminModal');
  } else {
    loginAttempts++;
    document.getElementById('loginError').style.display = 'block';
    if (loginAttempts >= 3) {
      document.getElementById('loginError').textContent = '❌ Too many attempts. Try again later.';
      setTimeout(() => closeModal('loginModal'), 1500);
    }
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function addCustomTask() {
  const name = document.getElementById('newTaskName').value.trim();
  if (!name) { showToast('⚠️ Task name is required!'); return; }
  const tag  = document.getElementById('newTaskTag').value;
  const note = document.getElementById('newTaskNote').value.trim();
  const days = document.getElementById('newTaskDays').value;
  const tasks = get('tasks') || [];
  const id = 'custom_' + Date.now();
  tasks.push({ id, name, tag, note, days });
  set('tasks', tasks);
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskNote').value = '';
  showToast('✅ Task added!');
  render();
  renderAdminTaskList();
}

function renderAdminTaskList() {
  const filter = document.getElementById('manageFilter')?.value || 'all';
  const tasks = (get('tasks') || []).filter(t => filter === 'all' || t.days === filter);
  const container = document.getElementById('adminTaskList');
  container.innerHTML = '';
  tasks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'admin-task-row';
    row.innerHTML = `
      <span class="atask-name">${t.name}</span>
      <span class="tag ${t.tag}" style="font-size:0.65rem">${t.days}</span>
      <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
    `;
    container.appendChild(row);
  });
  if (!tasks.length) container.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:8px">No tasks found.</div>';
}

function deleteTask(id) {
  let tasks = get('tasks') || [];
  tasks = tasks.filter(t => t.id !== id);
  set('tasks', tasks);
  showToast('🗑 Task removed');
  render();
  renderAdminTaskList();
}

function changePassword() {
  const np = document.getElementById('newPassInput').value;
  const cp = document.getElementById('confirmPassInput').value;
  const msg = document.getElementById('passMsg');
  if (!np) { msg.style.color = '#ef4444'; msg.textContent = 'Password cannot be empty.'; return; }
  if (np !== cp) { msg.style.color = '#ef4444'; msg.textContent = '❌ Passwords do not match.'; return; }
  set('password', np);
  msg.style.color = '#10b981';
  msg.textContent = '✅ Password updated!';
  document.getElementById('newPassInput').value = '';
  document.getElementById('confirmPassInput').value = '';
}

function nukeData() {
  if (confirm('⚠️ This will delete ALL tasks and history. Are you sure?')) {
    localStorage.clear();
    initStorage();
    closeModal('adminModal');
    render();
    showToast('🗑 All data cleared. Fresh start!');
  }
}

// ─────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const ids = ['addTask', 'manageTasks', 'settings'];
    b.classList.toggle('active', ids[i] === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-' + tabId);
  });
  if (tabId === 'manageTasks') renderAdminTaskList();
}

// ─────────────────────────────────────────────
//  MODALS
// ─────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

// ─────────────────────────────────────────────
//  RESET
// ─────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all of today\'s progress?')) {
    const h = get('history') || {};
    h[todayKey()] = {};
    set('history', h);
    render();
    showToast('↺ Today reset!');
  }
});

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────
//  PWA SERVICE WORKER
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
initStorage();
render();

// Auto-refresh at midnight
setInterval(() => {
  const now = new Date();
  if (now.getHours() === 0 && now.getMinutes() === 0) render();
}, 60000);
  let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;

  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});
</script>
